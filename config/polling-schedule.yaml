# Market-Aware Polling Schedule
#
# Three modes based on time of day and market hours.
# All times in US Eastern.

modes:
  active:
    when: "Mon-Fri 09:00-16:30 ET"
    description: "US market hours. Maximum attention."
    twitter_poll_minutes: 5
    youtube_check_minutes: 15
    market_poll_minutes: 5
    arxiv_poll_minutes: 60
    substack_poll_minutes: 60
    extraction_interval: "every 2 hours or triggered by high_signal triage"
    compilation: "triggered by extraction completion"

  watch:
    when: "Mon-Fri 16:30-20:00 ET, Sun 18:00-23:59 ET"
    description: "After-hours and Sunday evening pre-market."
    twitter_poll_minutes: 10
    youtube_check_minutes: 30
    market_poll_minutes: 15
    arxiv_poll_minutes: 120
    substack_poll_minutes: 120
    extraction_interval: "every 4 hours"
    compilation: "daily batch at 20:00 ET"

  sleep:
    when: "All other times"
    description: "Overnight and weekends. Minimal polling."
    twitter_poll_minutes: 30
    youtube_check_minutes: 60
    market_poll_minutes: 60
    arxiv_poll_minutes: 240
    substack_poll_minutes: 240
    extraction_interval: "daily batch at 06:00 ET"
    compilation: "daily batch at 06:30 ET"

synthesis:
  # Intraday briefs: Sonnet reframes all new intelligence since last brief.
  # Fires during Active and Watch modes. Skips if no new extractions since last run.
  intraday_brief:
    model: sonnet
    active_mode: "every 4 hours (10:00, 14:00, 18:00 ET)"
    watch_mode: "once at 20:00 ET"
    sleep_mode: "skip"
    trigger: "also fires on-demand when 3+ high_signal extractions arrive within 2 hours"
    cost_estimate: "~$0.25/run, ~$20/month"

  # Daily wrap: Sonnet produces end-of-day synthesis covering all activity.
  # Supersedes the day's intraday briefs.
  daily_wrap:
    model: sonnet
    schedule: "daily at 21:00 ET"
    cost_estimate: "~$0.40/run, ~$12/month"

  # Weekly deep: Sonnet reviews the week's themes, thesis health, and source performance.
  weekly_deep:
    model: sonnet
    schedule: "Sunday 04:00 ET"
    cost_estimate: "~$0.60/run, ~$2.50/month"

  # Monthly review: Opus performs deep structural analysis — cross-domain connections,
  # thesis stress tests, source accuracy scoring, weak signal surfacing.
  # This is where Opus justifies its cost with insights Sonnet can't reach.
  monthly_review:
    model: opus
    schedule: "1st Sunday 05:00 ET"
    cost_estimate: "~$5/run, ~$5/month"

recurring:
  lint: "weekly, Sunday 03:00 ET"
  source_review: "monthly, 1st Sunday 06:00 ET (after Opus monthly review)"
  git_commit: "every 60 min (skip if no changes)"
  git_push: "every 60 min (after commit)"
