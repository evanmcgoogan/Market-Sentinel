      notes: "Resolved from @Places302. RSS title shows 'Megaprojects' — same creator."

arxiv:
  # arXiv research paper ingestion — free API, no key required.
  # Papers are ingested as abstracts. The extraction pipeline pulls key claims.
  # Category reference: https://arxiv.org/category_taxonomy
  categories:
    - id: cs.AI
      label: "Artificial Intelligence"
      tier: A
      domains: [ai, deep-learning]
      notes: "Core AI papers. AGI architecture, reasoning, planning, knowledge."

    - id: cs.LG
      label: "Machine Learning"
      tier: A
      domains: [ai, deep-learning, ml]
      notes: "ML theory and methods. Training dynamics, scaling laws, optimization."

