substack:
  # Newsletter RSS ingestion — free, no API key required.
  # Paywalled posts are detected by word count < 150 and flagged in frontmatter.
  # Even truncated teasers carry signal (framing, thesis direction, topic focus).
  newsletters:
    # === A-TIER (5) — High signal, long-form thinking ===

    - name: "Not Boring"
      author: "Packy McCormick"
      rss_url: "https://www.notboring.co/feed"
      tier: A
      domains: [ai, startups, tech-strategy, investing]
      notes: "Deep-dive essays on emerging tech companies and market narratives."

    - name: "The Diff"
      author: "Byrne Hobart"
      rss_url: "https://thediff.co/feed"
      tier: A
      domains: [finance, markets, complexity, macro]
      notes: "Unusual connections between markets, tech, and history. Paywalled mostly."

    - name: "Stratechery"
      author: "Ben Thompson"
      rss_url: "https://stratechery.com/feed/"
      tier: A
      domains: [tech-strategy, media, business, ai]
      notes: "Aggregation theory and tech business strategy. Mostly paywalled."

    - name: "Noahpinion"
      author: "Noah Smith"
      rss_url: "https://noahpinion.substack.com/feed"
      tier: A
      domains: [macro, economics, tech-policy, ai]
      notes: "Econ takes on AI, trade, and industrial policy."

    - name: "Astral Codex Ten"
      author: "Scott Alexander"
      rss_url: "https://astralcodexten.substack.com/feed"
      tier: A
      domains: [science, rationality, ai-risk, forecasting]
      notes: "Careful reasoning on AI risk, forecasting, and complex systems."

    # === B-TIER (4) — Useful signal, worth monitoring ===

    - name: "The Generalist"
      author: "Mario Gabriele"
      rss_url: "https://www.readthegeneralist.com/feed"
      tier: B
      domains: [startups, investing, deep-dives]
      notes: "Deep dives on frontier tech companies."

    - name: "Gary Marcus on AI"
      author: "Gary Marcus"
      rss_url: "https://garymarcus.substack.com/feed"
      tier: B
      domains: [ai, skepticism, alignment, evaluation]
