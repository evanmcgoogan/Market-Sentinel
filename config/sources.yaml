# Signal Hunter Source Configuration
#
# Tier definitions: see agent_docs/source-tiers.md
#   S: Outlier signal. Full attention. Every claim extracted.
#   A: High signal. Key claims extracted.
#   B: Useful signal. Triage first, extract if signal.
#   C: Ambient. Triage only. Promote on merit.

twitter:
  api: socialdata                        # socialdata | twitterapiio | official
  poll_interval_minutes: 10
  accounts:
    # === S-TIER ===
    # Populated from your curated follow list.
    # Format:
    #   - handle: username
    #     tier: S
    #     domains: [domain1, domain2]
    #     notes: "Why this source matters"

    # === A-TIER ===

    # === B-TIER ===

    # === C-TIER ===

youtube:
  poll_interval_minutes: 30
  transcript_method: youtube-transcript-api
  transcript_fallback: whisper-api
  whisper_wait_hours: 2                  # Wait for auto-captions before fallback
  channels:
    # === S-TIER ===
    # Format:
    #   - name: "Channel Name"
    #     channel_id: "UCxxxxxxxxx"
    #     tier: S
    #     domains: [domain1, domain2]
    #     notes: "Why this source matters"

    # === A-TIER ===

    # === B-TIER ===

    # === C-TIER ===

markets:
  sources:
    - name: polymarket
      type: prediction-market
      poll: true
    - name: kalshi
      type: prediction-market
      poll: true
    - name: price-feeds
      type: asset-prices
      assets: [SPY, QQQ, VIX, TLT, GLD, WTI, BTC, ETH]
      poll: true
