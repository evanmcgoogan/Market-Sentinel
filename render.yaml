services:
  - type: web
    name: market-sentinel
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python3 -c "from src.web_server import app; print(f'Build OK: {len(list(app.url_map.iter_rules()))} routes')"
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SENTINEL_CONFIG
        value: config.example.json
      - key: SENTINEL_DB_PATH
        value: /var/data/market_sentinel.db
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: market-sentinel-data
      mountPath: /var/data
      sizeGB: 10
